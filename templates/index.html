<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --border-color: #334155;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 3rem 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            letter-spacing: -0.025em;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.875rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: rgba(15, 23, 42, 0.6);
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: var(--transition);
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            font-size: 1rem;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.5);
        }

        .btn-success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .btn-success:hover {
            background-color: rgba(16, 185, 129, 0.2);
        }

        .btn-danger {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .btn-danger:hover {
            background-color: rgba(239, 68, 68, 0.2);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem;
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .task-item:hover {
            transform: translateY(-3px);
            border-color: #475569;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .task-content {
            flex-grow: 1;
            padding-right: 1.5rem;
        }

        .task-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .task-desc {
            color: #94a3b8;
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 9999px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-pending {
            background-color: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .status-done {
            background-color: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .task-done {
            opacity: 0.8;
            background-color: rgba(30, 41, 59, 0.5);
        }

        .task-done .task-title span:first-child {
            text-decoration: line-through;
            color: #64748b;
        }

        .empty-state {
            text-align: center;
            color: #64748b;
            padding: 3rem 1rem;
            background-color: rgba(30, 41, 59, 0.5);
            border-radius: 12px;
            border: 1px dashed var(--border-color);
        }
        
        @media (max-width: 600px) {
            .task-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 1.25rem;
            }
            .task-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Task Manager</h1>

        <!-- Create Task Form -->
        <div class="card">
            <form id="task-form">
                <div class="form-group">
                    <label for="title">Task Title</label>
                    <input type="text" id="title" required placeholder="What needs to be done?" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <textarea id="description" rows="3" placeholder="Add some details about this task..."></textarea>
                </div>
                <button type="submit" class="btn-primary">Add Task</button>
            </form>
        </div>

        <!-- Task List -->
        <div class="task-list" id="tasks-container">
            <!-- Tasks will be injected here via JavaScript -->
        </div>
    </div>

    <script>
        // Use an array to keep the state of tasks locally
        let tasks = [];
        const tasksContainer = document.getElementById('tasks-container');

        // Fetch tasks from API
        async function fetchTasks() {
            try {
                const response = await fetch('/api/tasks');
                if (!response.ok) throw new Error('Failed to fetch');
                tasks = await response.json();
                renderTasks();
            } catch (error) {
                console.error('Error fetching tasks:', error);
                tasksContainer.innerHTML = '<div class="empty-state">Error loading tasks. Is the server running?</div>';
            }
        }

        // Render tasks into the DOM
        function renderTasks() {
            tasksContainer.innerHTML = '';
            
            if (tasks.length === 0) {
                tasksContainer.innerHTML = `
                    <div class="empty-state">
                        <svg style="width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.5;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        <p style="margin: 0; font-size: 1.1rem; color: #94a3b8;">No tasks yet.</p>
                        <p style="margin: 0.5rem 0 0 0; font-size: 0.9rem;">Create your first task above!</p>
                    </div>`;
                return;
            }

            tasks.forEach(task => {
                const isDone = task.status === 'done';
                const taskElement = document.createElement('div');
                taskElement.className = `task-item ${isDone ? 'task-done' : ''}`;
                
                taskElement.innerHTML = `
                    <div class="task-content">
                        <h3 class="task-title">
                            <span>${escapeHtml(task.title)}</span>
                            <span class="status-badge ${isDone ? 'status-done' : 'status-pending'}">
                                ${task.status}
                            </span>
                        </h3>
                        ${task.description ? `<p class="task-desc">${escapeHtml(task.description)}</p>` : ''}
                    </div>
                    <div class="task-actions">
                        <button class="btn-success" onclick="toggleTaskStatus(${task.id}, '${task.status}')">
                            ${isDone ? 'Undo' : 'Complete'}
                        </button>
                        <button class="btn-danger" onclick="deleteTask(${task.id})">Delete</button>
                    </div>
                `;
                
                tasksContainer.appendChild(taskElement);
            });
        }

        // Handle form submission for creating a task
        document.getElementById('task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const titleInput = document.getElementById('title');
            const descInput = document.getElementById('description');
            
            const title = titleInput.value.trim();
            const description = descInput.value.trim();

            if (!title) return;

            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description })
                });

                if (response.ok) {
                    titleInput.value = '';
                    descInput.value = '';
                    fetchTasks();
                }
            } catch (error) {
                console.error('Error creating task:', error);
            }
        });

        // Toggle the status of a task
        async function toggleTaskStatus(taskId, currentStatus) {
            const newStatus = currentStatus === 'pending' ? 'done' : 'pending';
            try {
                const response = await fetch(`/api/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    fetchTasks();
                }
            } catch (error) {
                console.error('Error updating task:', error);
            }
        }

        // Delete a task
        async function deleteTask(taskId) {
            if (!confirm('Are you sure you want to delete this task?')) return;
            
            try {
                const response = await fetch(`/api/tasks/${taskId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    fetchTasks();
                }
            } catch (error) {
                console.error('Error deleting task:', error);
            }
        }

        // Simple HTML escaper to prevent XSS
        function escapeHtml(unsafe) {
            return (unsafe || '')
                 .toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // Load tasks initially
        document.addEventListener('DOMContentLoaded', fetchTasks);
    </script>
</body>
</html>
